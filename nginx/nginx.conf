# QuantCEO API Gateway
# Routes traffic to microservices

events { worker_connections 1024; }

http {
  upstream quant-trading { server quant-trading:4001; }
  upstream quant-sso      { server quant-sso:3002; }
  upstream quant-ai       { server quant-ai:4002; }
  upstream market-data    { server market-data:4003; }
  upstream scan-engine    { server scan-engine:4004; }
  upstream indicator-svc  { server indicator-service:4005; }

  server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # AI routes → quant-ai
    location /api/ai/ {
      proxy_pass http://quant-ai/api/ai/;
      proxy_set_header Host $host;
    }

    # Data routes → market-data
    location /api/data/ {
      proxy_pass http://market-data/api/data/;
      proxy_set_header Host $host;
    }

    # Scan routes → scan-engine
    location /api/scan/ {
      proxy_pass http://scan-engine/api/scan/;
      proxy_set_header Host $host;
    }

    # Indicator routes → indicator-service
    location /api/indicators/ {
      proxy_pass http://indicator-svc/api/indicators/;
      proxy_set_header Host $host;
    }

    # SSO auth
    location /api/auth/ {
      proxy_pass http://quant-sso/api/auth/;
      proxy_set_header Host $host;
    }

    # All other API → quant-trading (main)
    location /api/ {
      proxy_pass http://quant-trading/api/;
      proxy_set_header Host $host;
    }

    # Frontend → quant-trading
    location / {
      proxy_pass http://quant-trading/;
      proxy_set_header Host $host;
    }
  }
}
