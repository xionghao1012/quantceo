name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # =============== quant-trading ===============
  quant-trading:
    name: quant-trading (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./quant-trading
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run --reporter=dot

  # =============== quant-ai ===============
  quant-ai:
    name: quant-ai (typecheck + test)
