# QuantCEO OSS — 开源版部署编排
# docker compose -f docker-compose.oss.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]

  db-init:
    build: ./quant-trading
    restart: "no"
    depends_on: { postgres: { condition: service_healthy } }
    environment:
      PG_HOST: postgres
      PG_DB: quant_ceo
      PG_USER: postgres
      PG_PASSWORD: postgres
    command: >
      sh -c "node dist/server/db/init.js &&
             node dist/server/db/seed.js &&
             node dist/server/db/seed_all_stocks.js && node dist/server/db/seedStrategies.js"

  market-data:
    build: ./market-data
    restart: unless-stopped
    depends_on: { db-init: { condition: service_completed_successfully } }
    environment:
      PORT: "4003"
      PG_HOST: postgres
      PG_DB: quant_ceo
      PG_USER: postgres
      PG_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
    ports: ["4003:4003"]

  scan-engine:
    build: ./scan-engine
    restart: unless-stopped
    depends_on: { db-init: { condition: service_completed_successfully } }
    environment:
      PORT: "4004"
      PG_HOST: postgres
      PG_DB: quant_ceo
      PG_USER: postgres
      PG_PASSWORD: postgres
    ports: ["4004:4004"]

  indicator-service:
    build: ./indicator-service
    restart: unless-stopped
    ports: ["4005:4005"]

  quant-trading:
    build: ./quant-trading
    restart: unless-stopped
    depends_on: { db-init: { condition: service_completed_successfully } }
    environment:
      PORT: "4001"
      PG_HOST: postgres
      PG_DB: quant_ceo
      PG_USER: postgres
      PG_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      REDIS_URL: redis://redis:6379
      USE_EXTERNAL_SCHEDULER: "true"
    ports: ["4001:4001"]

  scheduler:
    build: ./scheduler
    restart: unless-stopped
    depends_on: { quant-trading: { condition: service_started } }

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["80:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [quant-trading]

volumes:
  pgdata:
